name: Release

# Builds automatically when package.json changes on main,
# or manually through the GitHub Actions interface.
on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the complete history so github.event.before is available.
          fetch-depth: 0

      - id: check
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs always proceed with a build.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(node -p "require('./package.json').version")
          BEFORE="${{ github.event.before }}"

          # A push event can contain multiple commits. Compare against the
          # repository state before the entire push rather than only HEAD~1.
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS=""
          else
            PREVIOUS=$(
              git show "${BEFORE}:package.json" 2>/dev/null |
                node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" \
                2>/dev/null || true
            )
          fi

          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [[ "$CURRENT" != "$PREVIOUS" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
          - os: macos-latest
            flag: --mac
          - os: ubuntu-latest
            flag: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Use npm ci when package-lock.json is committed.
      - run: npm ci

      - run: npm run build

      - name: Build and publish release
        run: npx electron-builder ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

# Builds automatically when package.json changes on main,
# or manually through the GitHub Actions interface.
on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Check package version
        id: check
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs always proceed with a build.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(node -p "require('./package.json').version")
          BEFORE="${{ github.event.before }}"

          # Compare against the repository state before the entire push.
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS=""
          else
            PREVIOUS=$(
              git show "${BEFORE}:package.json" 2>/dev/null |
                node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" \
                2>/dev/null || true
            )
          fi

          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [[ "$CURRENT" != "$PREVIOUS" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: blacksmith-4vcpu-windows-2025
            flag: --win

          - name: macOS
            os: blacksmith-6vcpu-macos-latest
            flag: --mac

          - name: Linux
            os: blacksmith-2vcpu-ubuntu-2404
            flag: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install and verify MSVC Spectre libraries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $component = "Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre"
          $buildToolsProduct = "Microsoft.VisualStudio.Product.BuildTools"

          $vswhere = Join-Path `
            ${env:ProgramFiles(x86)} `
            "Microsoft Visual Studio\Installer\vswhere.exe"

          $installer = Join-Path `
            ${env:ProgramFiles(x86)} `
            "Microsoft Visual Studio\Installer\setup.exe"

          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe was not found at: $vswhere"
          }

          if (!(Test-Path $installer)) {
            throw "Visual Studio Installer was not found at: $installer"
          }

          $installPath = & $vswhere `
            -latest `
            -products $buildToolsProduct `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (!$installPath) {
            throw "Visual Studio Build Tools 2022 with the C++ toolchain was not found"
          }

          $installPath = $installPath.Trim()
          Write-Host "Visual Studio Build Tools location: $installPath"

          $alreadyInstalled = & $vswhere `
            -latest `
            -products $buildToolsProduct `
            -requires $component `
            -property installationPath

          if (!$alreadyInstalled) {
            Write-Host "Installing MSVC Spectre-mitigated libraries..."

            $arguments = @(
              "modify"
              "--installPath"
              "`"$installPath`""
              "--add"
              $component
              "--quiet"
              "--norestart"
            )

            $process = Start-Process `
              -FilePath $installer `
              -ArgumentList $arguments `
              -Wait `
              -PassThru

            if ($process.ExitCode -notin @(0, 3010)) {
              throw "Visual Studio Installer failed with exit code $($process.ExitCode)"
            }

            if ($process.ExitCode -eq 3010) {
              Write-Host "Visual Studio Installer requested a restart; continuing without restarting."
            }
          }
          else {
            Write-Host "MSVC Spectre libraries are already installed."
          }

          $verifiedPath = & $vswhere `
            -latest `
            -products $buildToolsProduct `
            -requires $component `
            -property installationPath

          if (!$verifiedPath) {
            throw "MSVC Spectre libraries could not be verified after installation"
          }

          Write-Host "MSVC Spectre libraries verified at: $($verifiedPath.Trim())"

          # Ensure node-gyp uses Visual Studio 2022.
          "npm_config_msvs_version=2022" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build and publish release
        run: npx electron-builder ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # electron-builder uploads every platform's artifacts to a draft release.
  # Publishing that draft before all platforms have uploaded makes the
  # remaining uploads fail silently ("existing type not compatible with
  # publishing type"), so the draft is only published here, after every
  # build job has finished.
  publish:
    name: Publish release
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          RELEASE_ID=$(
            gh api "repos/${{ github.repository }}/releases" \
              --jq ".[] | select(.tag_name == \"$TAG\" and .draft) | .id"
          )

          if [[ -z "$RELEASE_ID" ]]; then
            echo "No draft release found for $TAG; nothing to publish."
            exit 0
          fi

          gh api --method PATCH \
            "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -F draft=false -f make_latest=true

          echo "Published $TAG"

  update-tap:
    name: Update Homebrew tap
    needs: publish
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out sshclient
        uses: actions/checkout@v4

      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Vapourware-Studios/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          ASSET="SSH-Client-${VERSION}-arm64.dmg"

          gh release download "$TAG" -R "${{ github.repository }}" -p "$ASSET" -O "$ASSET"
          SHA256=$(shasum -a 256 "$ASSET" | cut -d' ' -f1)

          CASK="homebrew-tap/Casks/sshclient.rb"
          sed -i "s/version \".*\"/version \"$VERSION\"/" "$CASK"
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" "$CASK"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Commit and push
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "Cask already up to date; nothing to push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/sshclient.rb
          git commit -m "sshclient ${VERSION}"
          git push
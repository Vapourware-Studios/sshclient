name: Release

# Builds automatically when package.json changes on main,
# or manually through the GitHub Actions interface.
on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - id: check
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs always proceed with a build.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(node -p "require('./package.json').version")
          BEFORE="${{ github.event.before }}"

          # A push event can contain multiple commits. Compare against the
          # repository state before the entire push rather than only HEAD~1.
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS=""
          else
            PREVIOUS=$(
              git show "${BEFORE}:package.json" 2>/dev/null |
                node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version"                 2>/dev/null || true
            )
          fi

          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [[ "$CURRENT" != "$PREVIOUS" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-windows-2025
            flag: --win

          - os: blacksmith-6vcpu-macos-latest
            flag: --mac

          - os: blacksmith-2vcpu-ubuntu-2404
            flag: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install MSVC Spectre libraries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe was not found"
          }

          $installPath = & $vswhere `
            -latest `
            -products Microsoft.VisualStudio.Product.BuildTools `
            -property installationPath

          if (!$installPath) {
            throw "Visual Studio Build Tools installation was not found"
          }

          Write-Host "Build Tools installation: $installPath"

          $bootstrapper = Join-Path $env:RUNNER_TEMP "vs_buildtools.exe"

          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vs_BuildTools.exe" `
            -OutFile $bootstrapper

          & $bootstrapper modify `
            --installPath "$installPath" `
            --add Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre `
            --quiet `
            --norestart `
            --wait

          if ($LASTEXITCODE -notin @(0, 3010)) {
            throw "Visual Studio component installation failed with exit code $LASTEXITCODE"
          }

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build and publish release
        run: npx electron-builder ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}